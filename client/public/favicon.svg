<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0f1e35"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer ring (bold) -->
  <circle cx="16" cy="16" r="14.2" fill="none" stroke="#00d4aa" stroke-width="1.1" opacity="0.85"/>

  <!-- Second ring (thinner, slightly inset) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#00d4aa" stroke-width="0.45" opacity="0.4"/>

  <!-- Innermost accent ring -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#00d4aa" stroke-width="0.4" opacity="0.22"/>

  <!-- Cardinal tick marks (long, between outer & second ring) -->
  <!-- N -->
  <line x1="16" y1="1.8" x2="16" y2="4.5" stroke="#00d4aa" stroke-width="1.4" stroke-linecap="round"/>
  <!-- S -->
  <line x1="16" y1="30.2" x2="16" y2="27.5" stroke="#00d4aa" stroke-width="1.4" stroke-linecap="round"/>
  <!-- E -->
  <line x1="30.2" y1="16" x2="27.5" y2="16" stroke="#00d4aa" stroke-width="1.4" stroke-linecap="round"/>
  <!-- W -->
  <line x1="1.8"  y1="16" x2="4.5"  y2="16" stroke="#00d4aa" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Intercardinal tick marks (short, subtle) -->
  <!-- NE: dir (0.707, -0.707), r outer=14.2 → (26.0, 6.0), r inner=12.5 → (24.8, 7.2) -->
  <line x1="26.0" y1="6.0"  x2="24.8" y2="7.2"  stroke="#00d4aa" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <!-- SE -->
  <line x1="26.0" y1="26.0" x2="24.8" y2="24.8" stroke="#00d4aa" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <!-- SW -->
  <line x1="6.0"  y1="26.0" x2="7.2"  y2="24.8" stroke="#00d4aa" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <!-- NW -->
  <line x1="6.0"  y1="6.0"  x2="7.2"  y2="7.2"  stroke="#00d4aa" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

  <!-- North needle — teal with glow, diamond shape -->
  <polygon
    points="16,6.5 14.2,16 16,14.6 17.8,16"
    fill="#00d4aa"
    filter="url(#glow)"
  />

  <!-- South needle — dim, same diamond -->
  <polygon
    points="16,25.5 14.2,16 16,17.4 17.8,16"
    fill="#00d4aa"
    opacity="0.18"
  />

  <!-- Center pivot ring -->
  <circle cx="16" cy="16" r="2.4" fill="#080d1a" stroke="#00d4aa" stroke-width="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="0.85" fill="#00d4aa"/>

  <!-- Glowing N dot on outer ring to mark North -->
  <circle cx="16" cy="3.2" r="1.1" fill="#00d4aa" filter="url(#glow)"/>
</svg>
